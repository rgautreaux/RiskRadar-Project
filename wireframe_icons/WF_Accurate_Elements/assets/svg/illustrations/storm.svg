<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="storm-cloud-1" x1="100" y1="60" x2="100" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="storm-cloud-2" x1="140" y1="70" x2="140" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#475569"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="lightning-gradient" x1="120" y1="130" x2="130" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF08A"/>
      <stop offset="0.5" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="storm-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Dark clouds -->
  <ellipse cx="80" cy="95" rx="42" ry="35" fill="url(#storm-cloud-1)" opacity="0.9"/>
  <ellipse cx="120" cy="85" rx="48" ry="40" fill="#475569" opacity="0.95"/>
  <ellipse cx="160" cy="100" rx="45" ry="37" fill="url(#storm-cloud-2)"/>
  <ellipse cx="100" cy="115" rx="38" ry="30" fill="#334155" opacity="0.9"/>
  <ellipse cx="140" cy="120" rx="40" ry="32" fill="#1E293B"/>
  
  <!-- Cloud highlights -->
  <ellipse cx="85" cy="88" rx="20" ry="15" fill="white" opacity="0.1"/>
  <ellipse cx="125" cy="80" rx="25" ry="18" fill="white" opacity="0.12"/>
  <ellipse cx="155" cy="95" rx="22" ry="16" fill="white" opacity="0.08"/>
  
  <!-- Lightning bolt with glow -->
  <path d="M120 130L110 155L125 155L115 185L140 155L125 155L135 130H120Z" 
        fill="url(#lightning-gradient)" 
        filter="url(#storm-glow)"
        opacity="0.95"/>
  
  <!-- Lightning core (brighter) -->
  <path d="M122 135L114 153L123 153L117 178L135 153L126 153L133 135H122Z" 
        fill="#FFFBEB"/>
  
  <!-- Rain -->
  <g opacity="0.6">
    <line x1="60" y1="125" x2="55" y2="145" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="75" y1="130" x2="70" y2="150" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="90" y1="135" x2="85" y2="155" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="105" y1="138" x2="100" y2="158" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
    
    <line x1="145" y1="140" x2="140" y2="160" stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="160" y1="135" x2="155" y2="155" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="175" y1="130" x2="170" y2="150" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="190" y1="125" x2="185" y2="145" stroke="#64748B" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Wind lines -->
  <path d="M40 190C45 187 50 193 55 190C60 187 65 193 70 190C75 187 80 193 85 190" 
        stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M155 195C160 192 165 198 170 195C175 192 180 198 185 195C190 192 195 198 200 195" 
        stroke="#CBD5E1" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Lightning flash effect -->
  <circle cx="125" cy="160" r="25" fill="#FEF08A" opacity="0.15"/>
  <circle cx="125" cy="160" r="15" fill="#FDE047" opacity="0.2"/>
</svg>
