<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="wave-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Globe (partially submerged) -->
  <circle cx="150" cy="180" r="80" fill="#0EA5E9"/>
  
  <!-- Continents on visible part of globe -->
  <path d="M 115 160 Q 105 155 100 165 Q 97 175 105 185 Q 115 195 125 185 Q 135 175 130 165 Q 125 158 115 160 Z" fill="#4ADE80"/>
  <path d="M 170 150 Q 165 145 160 150 Q 155 160 160 172 Q 165 185 180 190 Q 195 193 205 185 Q 212 175 210 165 Q 205 155 195 153 Q 185 152 170 150 Z" fill="#4ADE80"/>
  <path d="M 105 200 Q 100 205 100 215 Q 102 227 110 235 Q 120 240 130 235 Q 137 228 135 218 Q 132 210 125 205 Q 117 202 105 200 Z" fill="#4ADE80"/>
  
  <!-- Large tsunami wave (left) -->
  <g filter="url(#wave-shadow)">
    <!-- Wave base -->
    <path d="M 20 200 Q 30 180 45 185 Q 55 190 65 180 Q 75 170 85 175 Q 95 180 100 185 L 100 260 L 20 260 Z" 
          fill="#1E40AF" opacity="0.9"/>
    <path d="M 25 205 Q 35 185 50 190 Q 60 195 70 185 Q 80 175 90 180 Q 100 185 105 190 L 105 260 L 25 260 Z" 
          fill="#2563EB" opacity="0.85"/>
    <path d="M 30 210 Q 40 190 55 195 Q 65 200 75 190 Q 85 180 95 185 Q 105 190 110 195 L 110 260 L 30 260 Z" 
          fill="#3B82F6" opacity="0.8"/>
    
    <!-- Wave crest -->
    <ellipse cx="50" cy="180" rx="35" ry="25" fill="#BAE6FD" opacity="0.7"/>
    <ellipse cx="65" cy="175" rx="30" ry="20" fill="#E0F2FE" opacity="0.8"/>
    <path d="M 35 185 Q 50 170 65 180 Q 75 188 85 182" stroke="#F0F9FF" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Large tsunami wave (right) -->
  <g filter="url(#wave-shadow)">
    <!-- Wave base -->
    <path d="M 200 190 Q 210 170 225 175 Q 235 180 245 170 Q 255 160 265 165 Q 275 170 280 175 L 280 260 L 200 260 Z" 
          fill="#1E40AF" opacity="0.9"/>
    <path d="M 205 195 Q 215 175 230 180 Q 240 185 250 175 Q 260 165 270 170 Q 280 175 285 180 L 285 260 L 205 260 Z" 
          fill="#2563EB" opacity="0.85"/>
    <path d="M 210 200 Q 220 180 235 185 Q 245 190 255 180 Q 265 170 275 175 Q 285 180 290 185 L 290 260 L 210 260 Z" 
          fill="#3B82F6" opacity="0.8"/>
    
    <!-- Wave crest -->
    <ellipse cx="235" cy="170" rx="35" ry="25" fill="#BAE6FD" opacity="0.7"/>
    <ellipse cx="250" cy="165" rx="30" ry="20" fill="#E0F2FE" opacity="0.8"/>
    <path d="M 220 175 Q 235 160 250 170 Q 260 178 270 172" stroke="#F0F9FF" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- Water spray/foam particles -->
  <circle cx="45" cy="165" r="4" fill="#E0F2FE" opacity="0.7"/>
  <circle cx="58" cy="158" r="3.5" fill="#DBEAFE" opacity="0.7"/>
  <circle cx="72" cy="163" r="3" fill="#BFDBFE" opacity="0.6"/>
  <circle cx="225" cy="155" r="4" fill="#E0F2FE" opacity="0.7"/>
  <circle cx="240" cy="148" r="3.5" fill="#DBEAFE" opacity="0.7"/>
  <circle cx="255" cy="153" r="3" fill="#BFDBFE" opacity="0.6"/>
  <circle cx="268" cy="158" r="3.5" fill="#E0F2FE" opacity="0.6"/>
  
  <!-- Bubbles rising -->
  <circle cx="140" cy="220" r="3" fill="#BFDBFE" opacity="0.5"/>
  <circle cx="160" cy="210" r="2.5" fill="#DBEAFE" opacity="0.5"/>
  <circle cx="175" cy="225" r="3.5" fill="#BFDBFE" opacity="0.5"/>
</svg>
