<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flood-house-gradient" x1="120" y1="60" x2="120" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="flood-roof-gradient" x1="120" y1="60" x2="120" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="flood-water-gradient" x1="120" y1="150" x2="120" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <!-- House body -->
  <rect x="60" y="120" width="120" height="60" rx="4" fill="url(#flood-house-gradient)"/>
  
  <!-- Roof -->
  <path d="M120 50L180 100H60L120 50Z" fill="url(#flood-roof-gradient)"/>
  <path d="M120 50L180 100H60L120 50Z" fill="white" opacity="0.1"/>
  
  <!-- Chimney -->
  <rect x="145" y="65" width="15" height="35" fill="#1E40AF"/>
  
  <!-- Windows -->
  <rect x="80" y="135" width="22" height="25" rx="2" fill="#1E3A8A" opacity="0.6"/>
  <rect x="138" y="135" width="22" height="25" rx="2" fill="#1E3A8A" opacity="0.6"/>
  <line x1="91" y1="135" x2="91" y2="160" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>
  <line x1="80" y1="147.5" x2="102" y2="147.5" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>
  <line x1="149" y1="135" x2="149" y2="160" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>
  <line x1="138" y1="147.5" x2="160" y2="147.5" stroke="#60A5FA" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Door -->
  <rect x="110" y="142" width="20" height="38" rx="2" fill="#1E3A8A"/>
  <circle cx="123" cy="161" r="1.5" fill="#60A5FA"/>
  
  <!-- Water waves with gradient -->
  <rect x="20" y="165" width="200" height="50" fill="url(#flood-water-gradient)" opacity="0.3"/>
  
  <path d="M20 165C20 165 30 158 40 165C50 172 60 158 70 165C80 172 90 158 100 165C110 172 120 158 130 165C140 172 150 158 160 165C170 172 180 158 190 165C200 172 210 158 220 165" 
        stroke="#3B82F6" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  
  <path d="M20 175C20 175 30 168 40 175C50 182 60 168 70 175C80 182 90 168 100 175C110 182 120 168 130 175C140 182 150 168 160 175C170 182 180 168 190 175C200 182 210 168 220 175" 
        stroke="#60A5FA" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <path d="M20 185C20 185 30 178 40 185C50 192 60 178 70 185C80 192 90 178 100 185C110 192 120 178 130 185C140 192 150 178 160 185C170 192 180 178 190 185C200 192 210 178 220 185" 
        stroke="#93C5FD" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Rain drops -->
  <line x1="45" y1="80" x2="42" y2="95" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="75" y1="70" x2="72" y2="85" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="165" y1="75" x2="162" y2="90" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="195" y1="85" x2="192" y2="100" stroke="#93C5FD" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
