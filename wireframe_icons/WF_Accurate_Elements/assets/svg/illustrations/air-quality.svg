<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="air-bg-gradient" x1="120" y1="40" x2="120" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="0.5" stop-color="#BAE6FD"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <linearGradient id="smog-gradient" x1="120" y1="120" x2="120" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#94A3B8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#64748B" stop-opacity="0.8"/>
    </linearGradient>
    <radialGradient id="particle-gradient">
      <stop stop-color="#F59E0B" offset="0"/>
      <stop stop-color="#D97706" offset="1"/>
    </radialGradient>
    <filter id="air-blur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  
  <!-- Clean sky background -->
  <rect x="30" y="50" width="180" height="80" fill="url(#air-bg-gradient)" rx="10"/>
  
  <!-- Cloud particles (clean air) -->
  <ellipse cx="70" cy="75" rx="25" ry="18" fill="white" opacity="0.7"/>
  <ellipse cx="90" cy="70" rx="30" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="110" cy="75" rx="28" ry="20" fill="white" opacity="0.75"/>
  
  <!-- Sun rays (good air quality) -->
  <circle cx="180" cy="70" r="20" fill="#FDE047" opacity="0.6"/>
  <g stroke="#FACC15" stroke-width="2.5" stroke-linecap="round" opacity="0.5">
    <line x1="180" y1="45" x2="180" y2="52"/>
    <line x1="198" y1="52" x2="193" y2="57"/>
    <line x1="205" y1="70" x2="198" y2="70"/>
    <line x1="198" y1="88" x2="193" y2="83"/>
    <line x1="162" y1="52" x2="167" y2="57"/>
  </g>
  
  <!-- Dividing line -->
  <line x1="30" y1="130" x2="210" y2="130" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 4"/>
  
  <!-- Polluted air layer -->
  <rect x="30" y="140" width="180" height="60" fill="url(#smog-gradient)" rx="10" filter="url(#air-blur)"/>
  
  <!-- Smog clouds -->
  <ellipse cx="65" cy="160" rx="28" ry="20" fill="#64748B" opacity="0.5" filter="url(#air-blur)"/>
  <ellipse cx="95" cy="165" rx="35" ry="24" fill="#475569" opacity="0.6" filter="url(#air-blur)"/>
  <ellipse cx="130" cy="160" rx="32" ry="22" fill="#64748B" opacity="0.55" filter="url(#air-blur)"/>
  <ellipse cx="165" cy="168" rx="30" ry="20" fill="#475569" opacity="0.6" filter="url(#air-blur)"/>
  
  <!-- Pollution particles -->
  <g opacity="0.7">
    <circle cx="50" cy="155" r="3" fill="#78716C"/>
    <circle cx="85" cy="148" r="2.5" fill="#57534E"/>
    <circle cx="110" cy="152" r="2" fill="#78716C"/>
    <circle cx="145" cy="158" r="3.5" fill="#57534E"/>
    <circle cx="175" cy="150" r="2.5" fill="#78716C"/>
    <circle cx="70" cy="172" r="2" fill="#A8A29E"/>
    <circle cx="120" cy="175" r="3" fill="#A8A29E"/>
    <circle cx="160" cy="180" r="2.5" fill="#A8A29E"/>
  </g>
  
  <!-- Hazardous particles (orange/yellow) -->
  <g opacity="0.6">
    <circle cx="60" cy="165" r="2.5" fill="url(#particle-gradient)"/>
    <circle cx="100" cy="158" r="3" fill="url(#particle-gradient)"/>
    <circle cx="140" cy="172" r="2.5" fill="url(#particle-gradient)"/>
    <circle cx="180" cy="162" r="3.5" fill="url(#particle-gradient)"/>
  </g>
  
  <!-- Factory silhouette -->
  <g opacity="0.4">
    <rect x="190" y="170" width="30" height="35" fill="#334155"/>
    <rect x="198" y="160" width="6" height="15" fill="#334155"/>
    <rect x="208" y="155" width="6" height="20" fill="#334155"/>
  </g>
  
  <!-- Smoke from factory -->
  <ellipse cx="201" cy="152" rx="4" ry="6" fill="#94A3B8" opacity="0.4" filter="url(#air-blur)"/>
  <ellipse cx="211" cy="147" rx="5" ry="7" fill="#94A3B8" opacity="0.35" filter="url(#air-blur)"/>
  
  <!-- Warning indicators -->
  <g transform="translate(40, 50)">
    <circle cx="0" cy="0" r="12" fill="#10B981" opacity="0.9"/>
    <path d="M-4 0L-1 3L4 -3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <g transform="translate(40, 150)">
    <circle cx="0" cy="0" r="12" fill="#EF4444" opacity="0.9"/>
    <path d="M0 -4V2" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <circle cx="0" cy="5" r="1.5" fill="white"/>
  </g>
  
  <!-- AQI labels -->
  <text x="58" y="55" fill="#047857" font-family="Inter, sans-serif" font-size="11" font-weight="600">GOOD</text>
  <text x="58" y="155" fill="#DC2626" font-family="Inter, sans-serif" font-size="11" font-weight="600">POOR</text>
</svg>
