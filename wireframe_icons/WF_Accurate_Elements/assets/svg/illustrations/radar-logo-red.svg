<svg width="400" height="200" viewBox="0 0 400 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="radar-red-bg" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF4444"/>
      <stop offset="1" stop-color="#FB923C"/>
    </linearGradient>
    <filter id="radar-red-glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="400" height="200" rx="16" fill="url(#radar-red-bg)"/>
  
  <!-- Radar circles -->
  <circle cx="200" cy="100" r="85" stroke="white" stroke-width="2" stroke-opacity="0.4" fill="none" stroke-dasharray="8 4"/>
  <circle cx="200" cy="100" r="65" stroke="white" stroke-width="2" stroke-opacity="0.5" fill="none"/>
  <circle cx="200" cy="100" r="45" stroke="white" stroke-width="2" stroke-opacity="0.6" fill="none"/>
  
  <!-- Crosshair lines -->
  <line x1="200" y1="0" x2="200" y2="200" stroke="white" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6 4"/>
  <line x1="0" y1="100" x2="400" y2="100" stroke="white" stroke-width="1.5" stroke-opacity="0.4" stroke-dasharray="6 4"/>
  
  <!-- Radar sweep arcs -->
  <path d="M 200 15 A 85 85 0 0 1 260 40" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.6" fill="none"/>
  <path d="M 140 160 A 85 85 0 0 1 110 110" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.5" fill="none"/>
  
  <!-- Arrows -->
  <g transform="translate(285, 40)">
    <path d="M -8 0 L 0 -8 L 8 0 L 4 0 L 4 8 L -4 8 L -4 0 Z" fill="white" opacity="0.7"/>
  </g>
  <g transform="translate(110, 160) rotate(180)">
    <path d="M -8 0 L 0 -8 L 8 0 L 4 0 L 4 8 L -4 8 L -4 0 Z" fill="white" opacity="0.7"/>
  </g>
  
  <!-- Small radar blips -->
  <circle cx="160" cy="70" r="3" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="130" r="3" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Central globe with exclamation mark -->
  <circle cx="200" cy="100" r="26" fill="#0EA5E9" filter="url(#radar-red-glow)"/>
  
  <!-- Green continents -->
  <path d="M 185 88 Q 180 86 178 90 Q 177 95 180 98 Q 183 100 186 98 Q 188 96 187 92 Q 186 89 185 88 Z" fill="#4ADE80"/>
  <path d="M 208 84 Q 205 82 203 84 Q 202 87 204 90 Q 206 91 209 90 Q 212 88 210 85 Q 209 83 208 84 Z" fill="#4ADE80"/>
  <path d="M 180 102 Q 178 104 178 108 Q 179 112 182 114 Q 185 115 187 112 Q 188 108 186 105 Q 184 103 180 102 Z" fill="#4ADE80"/>
  <path d="M 204 96 Q 202 94 200 96 Q 198 100 200 105 Q 202 110 206 112 Q 210 113 213 110 Q 215 106 214 102 Q 212 98 208 97 Q 206 96 204 96 Z" fill="#4ADE80"/>
  <path d="M 214 92 Q 212 90 210 92 Q 208 95 210 100 Q 212 103 216 104 Q 220 104 222 101 Q 223 97 221 94 Q 219 91 216 91 Q 215 91 214 92 Z" fill="#4ADE80"/>
  
  <!-- Exclamation mark -->
  <rect x="197" y="86" width="6" height="20" rx="3" fill="white"/>
  <circle cx="200" cy="112" r="4" fill="white"/>
</svg>
