<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Globe -->
  <circle cx="150" cy="150" r="90" fill="#0EA5E9"/>
  
  <!-- Continents on globe -->
  <path d="M 110 130 Q 100 125 95 135 Q 92 145 100 155 Q 110 165 120 155 Q 130 145 125 135 Q 120 128 110 130 Z" fill="#4ADE80"/>
  <path d="M 170 120 Q 165 115 160 120 Q 155 130 160 142 Q 165 155 180 160 Q 195 163 205 155 Q 212 145 210 135 Q 205 125 195 123 Q 185 122 170 120 Z" fill="#4ADE80"/>
  <path d="M 100 170 Q 95 175 95 185 Q 97 197 105 205 Q 115 210 125 205 Q 132 198 130 188 Q 127 180 120 175 Q 112 172 100 170 Z" fill="#4ADE80"/>
  
  <!-- Earthquake crack through globe -->
  <path d="M 70 120 L 85 135 L 95 125 L 110 145 L 125 135 L 140 150 L 155 140 L 175 160 L 190 150 L 210 170 L 230 160" 
        stroke="#334155" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 120 L 85 135 L 95 125 L 110 145 L 125 135 L 140 150 L 155 140 L 175 160 L 190 150 L 210 170 L 230 160" 
        stroke="#475569" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Buildings on continents -->
  <!-- Blue building (left) -->
  <g transform="translate(85, 145)">
    <rect x="0" y="0" width="18" height="22" fill="#60A5FA"/>
    <rect x="2" y="3" width="4" height="4" fill="#1E3A8A" opacity="0.6"/>
    <rect x="7" y="3" width="4" height="4" fill="#1E3A8A" opacity="0.6"/>
    <rect x="12" y="3" width="4" height="4" fill="#1E3A8A" opacity="0.6"/>
    <rect x="2" y="9" width="4" height="4" fill="#1E3A8A" opacity="0.6"/>
    <rect x="7" y="9" width="4" height="4" fill="#1E3A8A" opacity="0.6"/>
    <rect x="12" y="9" width="4" height="4" fill="#1E3A8A" opacity="0.6"/>
  </g>
  
  <!-- Yellow building (right) -->
  <g transform="translate(195, 135) rotate(5)">
    <rect x="0" y="0" width="16" height="25" fill="#FCD34D"/>
    <rect x="2" y="3" width="3" height="3" fill="#92400E" opacity="0.6"/>
    <rect x="6" y="3" width="3" height="3" fill="#92400E" opacity="0.6"/>
    <rect x="11" y="3" width="3" height="3" fill="#92400E" opacity="0.6"/>
    <rect x="2" y="8" width="3" height="3" fill="#92400E" opacity="0.6"/>
    <rect x="6" y="8" width="3" height="3" fill="#92400E" opacity="0.6"/>
    <rect x="11" y="8" width="3" height="3" fill="#92400E" opacity="0.6"/>
  </g>
  
  <!-- Small house (bottom left) -->
  <g transform="translate(115, 190) rotate(-3)">
    <rect x="0" y="5" width="14" height="12" fill="#FEF3C7"/>
    <path d="M -2 5 L 7 -2 L 16 5 Z" fill="#EF4444"/>
    <rect x="5" y="10" width="4" height="7" fill="#78716C"/>
    <rect x="1" y="8" width="4" height="4" fill="#60A5FA" opacity="0.7"/>
  </g>
  
  <!-- Small house (right) -->
  <g transform="translate(180, 175)">
    <rect x="0" y="4" width="12" height="10" fill="#FEF3C7"/>
    <path d="M -1 4 L 6 -1 L 13 4 Z" fill="#DC2626"/>
    <rect x="4" y="8" width="4" height="6" fill="#78716C"/>
  </g>
  
  <!-- Falling debris -->
  <rect x="145" y="115" width="8" height="6" fill="#64748B" opacity="0.6" transform="rotate(25)"/>
  <rect x="165" y="180" width="6" height="8" fill="#475569" opacity="0.6" transform="rotate(-15)"/>
</svg>
