<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="tornado-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Globe -->
  <circle cx="150" cy="180" r="90" fill="#0EA5E9"/>
  
  <!-- Continents on globe -->
  <path d="M 110 160 Q 100 155 95 165 Q 92 175 100 185 Q 110 195 120 185 Q 130 175 125 165 Q 120 158 110 160 Z" fill="#4ADE80"/>
  <path d="M 170 150 Q 165 145 160 150 Q 155 160 160 172 Q 165 185 180 190 Q 195 193 205 185 Q 212 175 210 165 Q 205 155 195 153 Q 185 152 170 150 Z" fill="#4ADE80"/>
  <path d="M 100 200 Q 95 205 95 215 Q 97 227 105 235 Q 115 240 125 235 Q 132 228 130 218 Q 127 210 120 205 Q 112 202 100 200 Z" fill="#4ADE80"/>
  <path d="M 190 205 Q 188 210 190 218 Q 193 225 200 228 Q 207 230 213 226 Q 218 220 216 213 Q 214 207 208 205 Q 202 204 190 205 Z" fill="#4ADE80"/>
  
  <!-- Tornado funnel -->
  <ellipse cx="150" cy="100" rx="45" ry="15" fill="#7DD3FC" opacity="0.6"/>
  <ellipse cx="150" cy="110" rx="42" ry="14" fill="#60A5FA" opacity="0.7"/>
  <ellipse cx="150" cy="120" rx="38" ry="13" fill="#3B82F6" opacity="0.75"/>
  <ellipse cx="150" cy="130" rx="34" ry="12" fill="#2563EB" opacity="0.8"/>
  <ellipse cx="150" cy="140" rx="30" ry="11" fill="#1D4ED8" opacity="0.85"/>
  <ellipse cx="150" cy="150" rx="25" ry="10" fill="#1E40AF" opacity="0.9"/>
  <ellipse cx="150" cy="160" rx="20" ry="9" fill="#1E3A8A" opacity="0.95"/>
  <ellipse cx="150" cy="170" rx="15" ry="8" fill="#1E3A8A"/>
  
  <!-- Swirl lines on tornado -->
  <path d="M 120 105 Q 140 108 160 105" stroke="#BAE6FD" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 125 120 Q 145 123 165 120" stroke="#93C5FD" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 128 135 Q 148 138 168 135" stroke="#60A5FA" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 132 150 Q 150 153 168 150" stroke="#3B82F6" stroke-width="2" fill="none" opacity="0.8"/>
  
  <!-- Flying debris -->
  <rect x="200" y="60" width="12" height="8" fill="#78716C" opacity="0.7" transform="rotate(25 206 64)"/>
  <rect x="90" y="75" width="10" height="6" fill="#57534E" opacity="0.7" transform="rotate(-15 95 78)"/>
  <rect x="210" y="100" width="8" height="12" fill="#6B7280" opacity="0.6" transform="rotate(40 214 106)"/>
  
  <!-- Motion lines -->
  <path d="M 220 35 Q 230 35 235 38" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 230 50 Q 242 48 250 50" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="240" y1="65" x2="255" y2="67" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
</svg>
