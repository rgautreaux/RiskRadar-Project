<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="weather-sun-gradient" x1="80" y1="40" x2="80" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF08A"/>
      <stop offset="0.5" stop-color="#FDE047"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <linearGradient id="weather-cloud-gradient" x1="140" y1="80" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1F5F9"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="weather-rain-cloud" x1="120" y1="140" x2="120" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#64748B"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <filter id="weather-glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="weather-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sun with glow -->
  <circle cx="80" cy="70" r="35" fill="#FEF3C7" opacity="0.4"/>
  <circle cx="80" cy="70" r="25" fill="url(#weather-sun-gradient)" filter="url(#weather-glow)"/>
  
  <!-- Sun rays -->
  <g stroke="#FACC15" stroke-width="3.5" stroke-linecap="round" opacity="0.7">
    <line x1="80" y1="30" x2="80" y2="40"/>
    <line x1="115" y1="35" x2="108" y2="42"/>
    <line x1="130" y1="70" x2="120" y2="70"/>
    <line x1="115" y1="105" x2="108" y2="98"/>
    <line x1="80" y1="110" x2="80" y2="100"/>
    <line x1="45" y1="105" x2="52" y2="98"/>
    <line x1="30" y1="70" x2="40" y2="70"/>
    <line x1="45" y1="35" x2="52" y2="42"/>
  </g>
  
  <!-- Partly cloudy cloud -->
  <g filter="url(#weather-shadow)">
    <ellipse cx="130" cy="100" rx="32" ry="24" fill="url(#weather-cloud-gradient)"/>
    <ellipse cx="160" cy="95" rx="35" ry="26" fill="#F8FAFC"/>
    <ellipse cx="190" cy="105" rx="30" ry="23" fill="url(#weather-cloud-gradient)"/>
    <ellipse cx="160" cy="115" rx="38" ry="26" fill="#F1F5F9"/>
  </g>
  
  <!-- Rain cloud -->
  <g transform="translate(0, 40)">
    <ellipse cx="80" cy="145" rx="35" ry="26" fill="url(#weather-rain-cloud)" filter="url(#weather-shadow)"/>
    <ellipse cx="110" cy="140" rx="38" ry="28" fill="#475569" filter="url(#weather-shadow)"/>
    <ellipse cx="140" cy="145" rx="36" ry="27" fill="url(#weather-rain-cloud)" filter="url(#weather-shadow)"/>
    <ellipse cx="110" cy="155" rx="40" ry="28" fill="#334155" filter="url(#weather-shadow)"/>
    
    <!-- Rain drops -->
    <g stroke="#60A5FA" stroke-width="3" stroke-linecap="round" opacity="0.7">
      <line x1="75" y1="175" x2="70" y2="190"/>
      <line x1="95" y1="180" x2="90" y2="195"/>
      <line x1="115" y1="175" x2="110" y2="190"/>
      <line x1="135" y1="180" x2="130" y2="195"/>
    </g>
  </g>
  
  <!-- Snowflakes -->
  <g transform="translate(160, 0)" opacity="0.8">
    <g stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round">
      <line x1="60" y1="140" x2="60" y2="152"/>
      <line x1="54" y1="146" x2="66" y2="146"/>
      <line x1="56" y1="142" x2="64" y2="150"/>
      <line x1="64" y1="142" x2="56" y2="150"/>
    </g>
    <g stroke="#93C5FD" stroke-width="2.5" stroke-linecap="round">
      <line x1="80" y1="155" x2="80" y2="167"/>
      <line x1="74" y1="161" x2="86" y2="161"/>
      <line x1="76" y1="157" x2="84" y2="165"/>
      <line x1="84" y1="157" x2="76" y2="165"/>
    </g>
    <g stroke="#DBEAFE" stroke-width="2" stroke-linecap="round">
      <line x1="45" y1="165" x2="45" y2="175"/>
      <line x1="40" y1="170" x2="50" y2="170"/>
      <line x1="42" y1="167" x2="48" y2="173"/>
      <line x1="48" y1="167" x2="42" y2="173"/>
    </g>
  </g>
  
  <!-- Wind lines -->
  <g stroke="#94A3B8" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <path d="M30 180C35 180 40 175 40 170C40 165 35 160 30 160"/>
    <path d="M50 190C57 190 63 185 63 178"/>
    <path d="M35 200C42 200 48 195 48 188"/>
  </g>
  
  <!-- Temperature indicator -->
  <g transform="translate(200, 140)">
    <rect x="-8" y="-25" width="16" height="35" rx="8" fill="#EF4444" opacity="0.2"/>
    <rect x="-6" y="-23" width="12" height="33" rx="6" fill="#EF4444"/>
    <circle cx="0" cy="15" r="9" fill="#DC2626"/>
    <circle cx="0" cy="15" r="6" fill="#FEE2E2"/>
  </g>
</svg>
