<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="local-alert-shadow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ground shadow -->
  <ellipse cx="150" cy="260" rx="80" ry="12" fill="#CBD5E1" opacity="0.3"/>
  
  <!-- House -->
  <rect x="100" y="180" width="100" height="80" fill="#FEF3C7" filter="url(#local-alert-shadow)"/>
  
  <!-- Roof -->
  <path d="M 85 180 L 150 130 L 215 180 Z" fill="#DC2626" filter="url(#local-alert-shadow)"/>
  <path d="M 85 180 L 150 130 L 215 180 Z" fill="#B91C1C" opacity="0.3"/>
  
  <!-- Large white exclamation mark on roof -->
  <rect x="143" y="145" width="14" height="35" rx="7" fill="white"/>
  <circle cx="150" cy="188" r="8" fill="white"/>
  
  <!-- Door -->
  <rect x="130" y="210" width="25" height="50" fill="#78716C"/>
  <circle cx="148" cy="235" r="2.5" fill="#D6D3D1"/>
  
  <!-- Window -->
  <rect x="165" y="200" width="25" height="25" fill="#60A5FA" opacity="0.7"/>
  <line x1="177.5" y1="200" x2="177.5" y2="225" stroke="#3B82F6" stroke-width="2"/>
  <line x1="165" y1="212.5" x2="190" y2="212.5" stroke="#3B82F6" stroke-width="2"/>
</svg>
