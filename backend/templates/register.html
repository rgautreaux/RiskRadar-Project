<!--
  RiskRadar - Registration Page

  HOW IT WORKS:
    1. User fills in name, email, password, and optional ZIP code.
    2. JavaScript sends POST /api/v1/users/register.
    3. The backend hashes the password with bcrypt and creates the user.
    4. On success, the user is redirected to the login page.
-->
{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-container">
    <h1>RiskRadar</h1>
    <p class="subtitle">Create your account</p>

    <form id="register-form">
        <div class="form-group">
            <label for="display_name">Display Name</label>
            <input type="text" id="display_name" placeholder="Your name" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Choose a password" required minlength="6">
        </div>
        <div class="form-group">
            <label for="zip_code">ZIP Code (optional)</label>
            <input type="text" id="zip_code" placeholder="e.g. 70801" maxlength="10">
        </div>
        <p class="error-msg" id="error-msg" role="alert" aria-live="assertive"></p>
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>

    <p class="link-text">
        Already have an account? <a href="/">Sign in</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errorEl = document.getElementById('error-msg');
        errorEl.dataset.visible = 'false';

        const body = {
            display_name: document.getElementById('display_name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            zip_code: document.getElementById('zip_code').value || null,
        };

        try {
            // POST /api/v1/users/register -> creates user in database
            const res = await apiFetch('/api/v1/users/register', 'POST', body);

            if (res.ok) {
                // Registration successful - redirect to login
                alert('Account created! Please sign in.');
                window.location.href = '/';
            } else {
                const err = await res.json();
                errorEl.textContent = err.detail || 'Registration failed';
                errorEl.dataset.visible = 'true';
            }
        } catch (err) {
            errorEl.textContent = 'Network error - is the server running?';
            errorEl.dataset.visible = 'true';
        }
    });
</script>
{% endblock %}
