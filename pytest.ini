[pytest]
testpaths = backend/tests backend
python_files = test_*.py test_scrape_and_summarize.py
pythonpath = backend
addopts = -v --tb=short
markers =
	live: marks tests that make real HTTP requests to external APIs (deselect with -m "not live")
filterwarnings =
	ignore:The default datetime adapter is deprecated as of Python 3.12:DeprecationWarning:sqlalchemy.engine.default